services:
  asr:
    build:
      context: .
    image: ghcr.io/fqscfqj/qwen-asr-docker:latest
    gpus: all
    env_file:
      - .env
    ports:
      - "${ASR_PORT:-8000}:8000"
    volumes:
      - ./models:/models
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
