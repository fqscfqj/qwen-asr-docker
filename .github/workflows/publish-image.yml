name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "额外推送的标签，可留空"
        required: false
        default: ""
        type: string
      push_latest:
        description: "额外推送 latest 标签"
        required: false
        default: false
        type: boolean
      bundle_flash_attention:
        description: "构建时安装 FlashAttention"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image tags
        id: prep
        shell: bash
        env:
          EXTRA_TAG: ${{ inputs.tag }}
          PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          REF_NAME="${GITHUB_REF_NAME,,}"
          SAFE_REF="$(echo "$REF_NAME" | tr '/ _' '---')"
          SHA_TAG="sha-${GITHUB_SHA::7}"

          TAGS="${IMAGE}:${SHA_TAG}"$'\n'"${IMAGE}:${SAFE_REF}"

          if [ -n "${EXTRA_TAG}" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:${EXTRA_TAG}"
          fi

          if [ "${PUSH_LATEST}" = "true" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
          fi

          {
            echo "image=${IMAGE}"
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.prep.outputs.tags }}
          build-args: |
            BUNDLE_FLASH_ATTENTION=${{ inputs.bundle_flash_attention }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
